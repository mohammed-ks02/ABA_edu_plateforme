<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Bon retour !</h1>
      <p class="auth-subtitle">Connectez-vous à votre compte</p>

      <div id="message" class="message hidden"></div>

      <form id="signin-form" class="auth-form">
        <div class="form-group">
          <label for="email">Adresse email</label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input type="email" id="email" name="email" placeholder="vous@exemple.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="Votre mot de passe" required />
            <button type="button" class="toggle-password" onclick="togglePassword('password')">👁</button>
          </div>
        </div>

        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" />
            <span>Se souvenir de moi</span>
          </label>
          <a href="#" class="forgot-link">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">
          <span class="btn-text">Se connecter</span>
          <span class="btn-loader hidden">⟳</span>
        </button>
      </form>

      <p class="auth-redirect">
        Pas encore de compte ? <a href="signup.html">S'inscrire</a>
      </p>
    </div>
  </div>

  <script>
    const PROXY = 'https://corsproxy.io/?url=';
    const LOGIN_URL = 'https://fusion-ai-api.medifus.dev/webhooks/webhook-aafaeb02-b71a-41d3-a151-b61ad5cec49d/auth/login';

    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = `message ${type}`;
    }

    document.getElementById('signin-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const btn = document.getElementById('submit-btn');
      btn.querySelector('.btn-text').classList.add('hidden');
      btn.querySelector('.btn-loader').classList.remove('hidden');
      btn.disabled = true;

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);

        const res = await fetch(PROXY + encodeURIComponent(LOGIN_URL), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          signal: controller.signal
        });
        clearTimeout(timeout);

        if (!res.ok) {
          showMessage('Email ou mot de passe incorrect.', 'error');
          return;
        }

        const data = await res.json();

        if (data.success === true) {
          localStorage.setItem('token', 'logged');
          localStorage.setItem('user', JSON.stringify({ email: email }));
          
          // Show popup with name
          const userName = localStorage.getItem('userName') || 'Utilisateur';
          alert('Bienvenue ' + userName + ' !');
          
          showMessage('Connexion réussie !', 'success');
        } else {
          showMessage('Email ou mot de passe incorrect.', 'error');
        }
      } catch (err) {
        showMessage('Email ou mot de passe incorrect.', 'error');
      } finally {
        btn.querySelector('.btn-text').classList.remove('hidden');
        btn.querySelector('.btn-loader').classList.add('hidden');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
